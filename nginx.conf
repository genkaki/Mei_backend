events {
    worker_connections 1024;
}

http {
    server_tokens off;
    charset utf-8;

    # 1. 自动将 HTTP (80) 重定向到 HTTPS (443)
    server {
        listen 80;
        server_name genkaki.me www.genkaki.me;

        # 用于 Certbot 验证域名所有权 (ACME Challenge)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. HTTPS (443) 核心配置
    server {
        listen 443 ssl;
        server_name genkaki.me www.genkaki.me;

        # 证书路径（需先执行申请脚本才会出现，初次运行 Nginx 可能会因找不到此文件报错，属正常现象）
        ssl_certificate /etc/letsencrypt/live/genkaki.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/genkaki.me/privkey.pem;

        # 代理到后端 Spring Boot
        location / {
            proxy_pass http://app:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 支持 SSE (AI 对话流式输出)
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }
    }
}
