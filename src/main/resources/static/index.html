<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeiStudio — AI 智能助手平台</title>
  <meta name="description" content="MeiStudio 是一个基于 Spring Boot + LangChain4j 的 AI 智能助手平台，支持 RAG 知识库检索和 MCP 协议插件扩展。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/assets/logo.png" type="image/png">
</head>
<body class="premium-dark">
  <canvas id="particles-canvas"></canvas>
  <div id="project-aura"></div>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="/assets/logo.png" alt="MeiStudio Logo" class="logo-img">
          <div class="logo-text">
            <span class="logo-title">MeiStudio</span>
            <span class="logo-subtitle">AI Platform Demo</span>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#/" class="nav-item active" data-page="landing">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
          <span class="nav-label">项目总览</span>
        </a>
        <a href="#/chat" class="nav-item" data-page="chat" data-protected="true" style="display:none">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
          <span class="nav-label">AI 对话</span>
          <span class="nav-badge" id="badge-rag" style="display:none">RAG</span>
        </a>
        <a href="#/knowledge" class="nav-item" data-page="knowledge" data-protected="true" style="display:none">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 6h10"/><path d="M8 10h10"/><path d="M8 14h10"/></svg></span>
          <span class="nav-label">知识库</span>
          <span class="nav-badge" id="badge-docs">0</span>
        </a>
        <a href="#/mcp" class="nav-item" data-page="mcp" data-protected="true" style="display:none">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon"><path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/></svg></span>
          <span class="nav-label">MCP 插件</span>
          <span class="nav-badge" id="badge-mcp">0</span>
        </a>
        <a href="#/settings" class="nav-item" data-page="settings" data-protected="true" style="display:none">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide-icon"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.72V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span class="nav-label">系统设置</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">未登录</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn btn-ghost btn-sm" id="logout-btn" style="display:none;padding:4px 10px;font-size:11px" onclick="window.__doLogout?.()">退出</button>
          <span class="version">v2.3.2</span>
        </div>
        <button class="theme-toggle" onclick="window.__toggleTheme()">
          <span id="theme-icon">🌙</span>
          <span class="theme-toggle-label">切换主题</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Bento Expansion Overlay -->
  <div id="bento-overlay" class="bento-overlay" style="display:none">
    <div class="bento-overlay-content">
      <button class="bento-close" onclick="window.__closeBento()">&times;</button>
      <div id="bento-detail-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="/particles.js"></script>
  <script type="module" src="/api.js"></script>
  <script type="module" src="/pages/landing.js"></script>
  <script type="module" src="/pages/chat.js"></script>
  <script type="module" src="/pages/knowledge.js"></script>
  <script type="module" src="/pages/mcp.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
